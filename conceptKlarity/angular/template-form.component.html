<form #tdForm="ngForm" (ngSubmit)="onSubmit(tdForm)" novalidate>
  <h3>Template-Driven Form</h3>

  <div>
    <label for="t-name">Name</label>
    <input id="t-name" name="name" ngModel required minlength="3" #nameCtrl="ngModel" />
    <div *ngIf="nameCtrl.invalid && (nameCtrl.dirty || nameCtrl.touched)">
      <small *ngIf="nameCtrl.errors?.required">Name is required.</small>
      <small *ngIf="nameCtrl.errors?.minlength">Minimum 3 characters.</small>
    </div>
  </div>

  <div>
    <label for="t-email">Email</label>
    <input id="t-email" type="email" name="email" ngModel required #emailCtrl="ngModel" />
    <div *ngIf="emailCtrl.invalid && (emailCtrl.dirty || emailCtrl.touched)">
      <small *ngIf="emailCtrl.errors?.required">Email is required.</small>
      <small *ngIf="emailCtrl.errors?.email">Invalid email format.</small>
    </div>
  </div>

  <button type="submit" [disabled]="tdForm.invalid">Submit</button>

  <pre>Form value: {{ tdForm.value | json }}</pre>
</form>
