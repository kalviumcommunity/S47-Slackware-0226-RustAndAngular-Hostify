<div class="card">
  <shared-card [title]="productName" [price]="price" [added]="inCart" (add)="addToCart()"></shared-card>

  <div class="actions">
    <shared-button [label]="favorite ? '★' : '☆'" (clicked)="toggleFavorite()"></shared-button>
  </div>

  <p *ngIf="inCart" class="added">Added to cart!</p>
  <p *ngIf="favorite" class="fav-note">Marked as favorite</p>
</div>
