<div class="product-list">
  <app-demo-cli></app-demo-cli>
  <app-binding-demo></app-binding-demo>
  <h3>Products</h3>
  <div class="search">
    <input placeholder="Search products" (input)="onSearchChange($any($event.target).value)" />
  </div>
  <div *ngIf="loadingList">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>
  <ul *ngIf="items$ | async as items">
    <li *ngFor="let p of items">{{ p.name }} — ${{ p.price }} <small>({{ p.status }})</small> <span *ngIf="p.description">— {{ p.description }}</span></li>
  </ul>

  <div class="load-more">
    <button (click)="loadMore()" [disabled]="loadingList">Load more</button>
  </div>

  <div class="new-item">
    <input [(ngModel)]="newName" placeholder="Name" [disabled]="submitting" />
    <input type="number" [(ngModel)]="newPrice" placeholder="Price" [disabled]="submitting" />
    <input [(ngModel)]="newDescription" placeholder="Description" [disabled]="submitting" />
    <button (click)="add()" [disabled]="submitting">Add</button>
  </div>

  <app-template-form></app-template-form>
  <app-reactive-form></app-reactive-form>
</div>
