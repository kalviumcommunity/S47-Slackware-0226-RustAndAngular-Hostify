<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <style>
    .box { fill:#fff; stroke:#0b5fff; stroke-width:2; rx:6; }
    .text { font-family:Arial, Helvetica, sans-serif; font-size:13px; fill:#0b2a66; }
    .arrow { stroke:#0b5fff; stroke-width:2; fill:none; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0b5fff"/>
    </marker>
  </defs>

  <rect x="40" y="20" width="200" height="50" class="box" />
  <text x="140" y="52" text-anchor="middle" class="text">User Interaction</text>

  <rect x="40" y="100" width="200" height="50" class="box" />
  <text x="140" y="132" text-anchor="middle" class="text">Angular Component</text>

  <rect x="40" y="180" width="200" height="50" class="box" />
  <text x="140" y="212" text-anchor="middle" class="text">Angular Service (HttpClient)</text>

  <rect x="280" y="100" width="200" height="50" class="box" />
  <text x="380" y="132" text-anchor="middle" class="text">Rust API Route</text>

  <rect x="280" y="180" width="200" height="50" class="box" />
  <text x="380" y="212" text-anchor="middle" class="text">Rust Handler / Business Logic</text>

  <rect x="280" y="260" width="200" height="50" class="box" />
  <text x="380" y="292" text-anchor="middle" class="text">PostgreSQL Query</text>

  <rect x="520" y="180" width="140" height="50" class="box" />
  <text x="590" y="212" text-anchor="middle" class="text">Rust JSON Response</text>

  <path d="M140 70 L140 100" class="arrow" />
  <path d="M140 150 L140 180" class="arrow" />
  <path d="M240 205 L280 205" class="arrow" />
  <path d="M380 230 L380 260" class="arrow" />
  <path d="M480 285 L520 285" class="arrow" />
  <path d="M660 205 L600 205 L600 150 L140 150" class="arrow" />

  <text x="100" y="90" class="text">click/input</text>
  <text x="160" y="195" class="text">service call</text>
  <text x="330" y="160" class="text">HTTP</text>
  <text x="410" y="240" class="text">business logic</text>
  <text x="560" y="285" class="text">serialize JSON</text>
</svg>
