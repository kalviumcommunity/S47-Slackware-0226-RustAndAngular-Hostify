<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <style>.text{font-family:Arial,Helvetica,sans-serif;font-size:13px;} .actor{font-weight:700} .arrow{stroke:#2b6cb0;stroke-width:2;fill:none;marker-end:url(#a)}</style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2b6cb0" />
    </marker>
  </defs>
  <text x="20" y="20" class="text actor">Component</text>
  <text x="220" y="20" class="text actor">ProductService</text>
  <text x="420" y="20" class="text actor">Rust API</text>

  <line x1="80" y1="40" x2="220" y2="40" class="arrow" />
  <text x="140" y="36" class="text">GET /api/items</text>

  <line x1="280" y1="60" x2="420" y2="60" class="arrow" />
  <text x="340" y="56" class="text">request with token</text>

  <text x="420" y="80" class="text">auth middleware checks token</text>

  <line x1="420" y1="100" x2="280" y2="100" class="arrow" />
  <text x="340" y="96" class="text">401 {error}</text>

  <line x1="220" y1="120" x2="80" y2="120" class="arrow" />
  <text x="140" y="116" class="text">error</text>

  <text x="80" y="140" class="text">show login prompt</text>
</svg>
