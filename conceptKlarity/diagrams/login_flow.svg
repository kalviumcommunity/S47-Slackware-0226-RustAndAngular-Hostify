<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220">
  <style>
    .text{ font-family: Arial, Helvetica, sans-serif; font-size:13px; fill:#111 }
    .actor{ font-weight:700 }
    .arrow{ stroke:#2b6cb0; stroke-width:2; fill:none; marker-end:url(#a) }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2b6cb0" />
    </marker>
  </defs>
  <text x="20" y="20" class="text actor">User</text>
  <text x="140" y="20" class="text actor">Angular Component</text>
  <text x="320" y="20" class="text actor">ProductService/AuthService</text>
  <text x="520" y="20" class="text actor">Rust API</text>
  <text x="620" y="20" class="text actor">PostgreSQL</text>

  <line x1="60" y1="40" x2="140" y2="40" class="arrow" />
  <text x="90" y="36" class="text">enter credentials, click Login</text>

  <line x1="200" y1="60" x2="320" y2="60" class="arrow" />
  <text x="250" y="56" class="text">login(credentials)</text>

  <line x1="420" y1="80" x2="520" y2="80" class="arrow" />
  <text x="470" y="76" class="text">POST /api/auth/login</text>

  <line x1="560" y1="100" x2="620" y2="100" class="arrow" />
  <text x="580" y="96" class="text">query user by username</text>

  <line x1="620" y1="120" x2="560" y2="120" class="arrow" />
  <text x="580" y="116" class="text">user row</text>

  <text x="420" y="140" class="text">verify password, generate JWT</text>

  <line x1="520" y1="160" x2="320" y2="160" class="arrow" />
  <text x="380" y="156" class="text">200 {token}</text>

  <line x1="320" y1="180" x2="140" y2="180" class="arrow" />
  <text x="200" y="176" class="text">token (store)</text>

  <line x1="140" y1="200" x2="60" y2="200" class="arrow" />
  <text x="90" y="196" class="text">navigate to /products</text>
</svg>
