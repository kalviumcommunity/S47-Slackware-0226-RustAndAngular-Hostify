<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220">
  <style>.text{font-family:Arial,Helvetica,sans-serif;font-size:13px;} .actor{font-weight:700} .arrow{stroke:#2b6cb0;stroke-width:2;fill:none;marker-end:url(#a)}</style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2b6cb0" />
    </marker>
  </defs>
  <text x="20" y="20" class="text actor">User</text>
  <text x="120" y="20" class="text actor">ProductListComponent</text>
  <text x="340" y="20" class="text actor">ProductService</text>
  <text x="460" y="20" class="text actor">Rust API</text>
  <text x="600" y="20" class="text actor">PostgreSQL</text>

  <line x1="60" y1="40" x2="120" y2="40" class="arrow" />
  <text x="80" y="36" class="text">fills form, clicks Add</text>

  <line x1="220" y1="60" x2="340" y2="60" class="arrow" />
  <text x="270" y="56" class="text">createItem({name,qty})</text>

  <line x1="420" y1="80" x2="460" y2="80" class="arrow" />
  <text x="440" y="76" class="text">POST /api/items</text>

  <text x="460" y="100" class="text">validate</text>

  <line x1="520" y1="120" x2="600" y2="120" class="arrow" />
  <text x="550" y="116" class="text">INSERT ... RETURNING *</text>

  <line x1="600" y1="140" x2="460" y2="140" class="arrow" />
  <text x="520" y="136" class="text">new product row</text>

  <line x1="460" y1="160" x2="340" y2="160" class="arrow" />
  <text x="380" y="156" class="text">201 {product}</text>

  <line x1="340" y1="180" x2="220" y2="180" class="arrow" />
  <text x="260" y="176" class="text">product</text>

  <text x="140" y="200" class="text">push to items, re-render</text>
</svg>
